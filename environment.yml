name: remeanflow
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9.19
  # GPU build: force from pytorch/nvidia channels (conda-forge has CPU-only)
  - pytorch::pytorch==2.1.0
  - pytorch::pytorch-cuda=12.1
  - pytorch::torchvision==0.16.0
  - pytorch::torchaudio==2.1.0
  - numpy=1.26.4
  - accelerate=0.29.2
  - matplotlib
  - timm=0.9.16
  - transformers=4.40.2
  - ipykernel
  - pip
  - pip:
    - pytorch-fid